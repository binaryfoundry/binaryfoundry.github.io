<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XorDev Shader Shuffle</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(11, 15, 20, 0.75);
      --text: #ecf2f8;
      --muted: #9eb2c4;
      --accent: #ff6b00;
      --accent2: #2ed3ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(1000px 500px at -10% -20%, rgba(255, 107, 0, 0.25), transparent),
        radial-gradient(700px 400px at 120% -10%, rgba(46, 211, 255, 0.20), transparent),
        linear-gradient(180deg, #0f151d, #070a0f 60%);
      color: var(--text);
      font-family: "Segoe UI", "SF Pro Display", "Helvetica Neue", sans-serif;
    }

    #gl {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      top: 14px;
      right: 14px;
      width: min(430px, calc(100vw - 28px));
      display: flex;
      justify-content: flex-end;
      z-index: 10;
      pointer-events: none;
    }

    .card {
      pointer-events: auto;
      max-width: 100%;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .ui-dock {
      width: 100%;
      transition: width 0.22s ease, transform 0.22s ease;
    }

    .dock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .dock-title {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .dock-body {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 10px;
    }

    .section-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .dock-toggle {
      padding: 6px 10px;
      font-size: 11px;
    }

    .ui-dock.minimized {
      width: 168px;
    }

    .ui-dock.minimized .dock-body {
      display: none;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta a {
      color: var(--accent2);
      text-decoration: none;
    }

    .btns {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .shader-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .audio-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .audio-stats {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mod-control {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mod-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      gap: 10px;
    }

    .mod-range {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .audio-viz {
      margin-top: 10px;
      width: 100%;
      height: 126px;
      display: block;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        radial-gradient(180px 80px at 10% 0%, rgba(46, 211, 255, 0.14), transparent 70%),
        radial-gradient(220px 120px at 90% 0%, rgba(255, 107, 0, 0.14), transparent 72%),
        rgba(9, 12, 17, 0.95);
    }

    .spectrum {
      margin-top: 8px;
      height: 42px;
      display: grid;
      grid-template-columns: repeat(28, minmax(0, 1fr));
      gap: 3px;
      align-items: end;
    }

    .spectrum-bar {
      border-radius: 6px 6px 2px 2px;
      min-height: 3px;
      background: linear-gradient(180deg, rgba(46, 211, 255, 0.9), rgba(255, 107, 0, 0.7));
      opacity: 0.85;
      transform-origin: bottom center;
      transform: scaleY(0.1);
      transition: transform 0.08s linear, opacity 0.12s linear;
    }

    .audio-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ed3ff;
      box-shadow: 0 0 8px rgba(46, 211, 255, 0.6);
      transition: transform 0.08s linear, background 0.12s linear;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover { border-color: rgba(255, 255, 255, 0.34); }

    .bar {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      z-index: 10;
    }

    .bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.08s linear;
    }

    .error {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 28px;
      z-index: 10;
      font-size: 12px;
      color: #ffd2c4;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      white-space: pre-wrap;
      max-height: 35vh;
      overflow: auto;
      display: none;
      background: rgba(86, 26, 16, 0.75);
      border: 1px solid rgba(255, 120, 90, 0.42);
      border-radius: 12px;
      padding: 8px 10px;
    }

    @media (max-width: 700px) {
      .hud {
        left: 14px;
        right: 14px;
        width: auto;
      }
      .ui-dock.minimized {
        width: 172px;
        margin-left: auto;
      }
      .btns { justify-content: flex-start; }
      .shader-head { align-items: flex-start; }
      .title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="hud">
    <div class="card ui-dock" id="uiDock">
      <div class="dock-head">
        <h2 class="dock-title">Visualizer Controls</h2>
        <button id="dockToggleBtn" class="dock-toggle" type="button" aria-expanded="true">Minimize</button>
      </div>

      <div class="dock-body" id="dockBody">
        <section class="section">
          <h3 class="section-title">Shader</h3>
          <div class="shader-head">
            <h1 class="title" id="shaderTitle">Loading shaders...</h1>
            <div class="btns">
              <button id="pauseBtn" type="button">Pause</button>
              <button id="nextBtn" type="button">Next Random</button>
            </div>
          </div>
          <div class="meta">
            <span id="shaderIndex"></span>
            <span>•</span>
            <a id="shaderLink" href="#" target="_blank" rel="noopener noreferrer">source</a>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">Audio Reactive</h3>
          <div class="audio-controls">
            <button id="audioMicBtn" type="button">Use Microphone</button>
            <button id="audioFileBtn" type="button">Load Audio File</button>
            <button id="audioStopBtn" type="button">Stop</button>
            <input id="audioFileInput" type="file" accept="audio/*" hidden />
          </div>
          <div class="audio-stats">
            <span id="audioStatus">Idle</span>
            <span>•</span>
            <span id="audioBpm">BPM --</span>
            <span>•</span>
            <span id="audioLevels">L 0.00</span>
            <span class="audio-pulse" id="audioPulseDot" aria-hidden="true"></span>
          </div>
          <div class="mod-control">
            <div class="mod-row">
              <span>Parameter Modulation</span>
              <strong id="modBoostValue">0.25x</strong>
            </div>
            <input
              id="modBoostSlider"
              class="mod-range"
              type="range"
              min="25"
              max="1100"
              step="1"
              value="25"
              aria-label="Parameter modulation boost"
            />
          </div>
          <canvas id="audioViz" class="audio-viz" width="640" height="126"></canvas>
          <div id="spectrum" class="spectrum" aria-hidden="true"></div>
        </section>
      </div>
    </div>
  </div>

  <div class="bar"><div id="timerBar"></div></div>
  <div class="error" id="errorBox"></div>

  <script type="module" src="./player.js"></script>
</body>
</html>
